<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Will You Be My Valentine?</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <div class="card" id="card1">
        <p class="pre-title">Hey Gorgeous...</p>
        <h1>Will you be my Valentine?</h1>
        
        <div class="heart-container">
            <div class="heart"></div>
        </div>

        <div class="buttons">
            <button class="yes" id="yesBtn">Yes Yes Yes</button>
            <button class="no" id="noBtn">Hell Nah</button>
        </div>
        <div class="message" id="message"></div>
    </div>

    <div class="card hidden" id="card2" onclick="revealSurprise()">
        <div id="surpriseContent">
            <h1>Click to reveal our date... 🎁</h1>
            <p>Tap the card for a surprise</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
